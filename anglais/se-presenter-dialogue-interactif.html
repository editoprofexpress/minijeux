<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="niveau" content="6e">
  <meta name="matiere" content="Anglais">
  <meta name="type" content="dialogue">
  <title>Se présenter — Dialogue interactif — Minijeux</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Nunito:wght@400;600;700;800;900&display=swap" rel="stylesheet">
  <style>
    :root {
      --subject: #2563eb;
      --subject-dark: #1d4ed8;
      --subject-light: #dbeafe;
      --subject-mid: #93c5fd;
      --success: #059669;
      --success-light: #d1fae5;
      --error: #dc2626;
      --error-light: #fee2e2;
      --bg: #eff6ff;
      --card: #ffffff;
      --text: #1e293b;
      --muted: #64748b;
      --border: #e2e8f0;
      --radius: 18px;
    }
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    body { font-family: 'Nunito', system-ui, sans-serif; background: var(--bg); color: var(--text); min-height: 100vh; display: flex; flex-direction: column; align-items: center; }

    /* TOP BAR */
    .top-bar { width: 100%; background: linear-gradient(135deg, #1e3a8a 0%, #1d4ed8 60%, #3b82f6 100%); color: white; padding: 1.25rem 1rem 3.5rem; text-align: center; position: relative; overflow: hidden; }
    .top-bar::after { content: ''; position: absolute; bottom: -20px; left: -5%; width: 110%; height: 40px; background: var(--bg); border-radius: 50% 50% 0 0; }
    .subject-badge { display: inline-flex; align-items: center; gap: 0.4rem; background: rgba(255,255,255,0.2); border-radius: 100px; padding: 0.25rem 0.8rem; font-size: 0.78rem; font-weight: 800; text-transform: uppercase; letter-spacing: 0.05em; margin-bottom: 0.75rem; }
    .top-bar h1 { font-size: clamp(1.2rem, 3.5vw, 1.7rem); font-weight: 900; margin-bottom: 0.3rem; }
    .top-bar p { font-size: 0.9rem; opacity: 0.85; }

    /* PROGRESS */
    .progress-wrap { background: var(--card); border-radius: 100px; padding: 0.7rem 1.25rem; box-shadow: 0 2px 12px rgba(37,99,235,0.08); display: flex; align-items: center; gap: 1rem; margin-bottom: 1.25rem; }
    .progress-bar { flex: 1; height: 8px; background: var(--border); border-radius: 100px; overflow: hidden; }
    .progress-fill { height: 100%; background: linear-gradient(90deg, var(--subject), #60a5fa); border-radius: 100px; transition: width .5s ease; }
    .progress-label { font-size: 0.85rem; font-weight: 800; color: var(--subject); white-space: nowrap; }

    /* CONTAINER */
    .container { width: 100%; max-width: 640px; padding: 0 1rem 3rem; flex: 1; display: flex; flex-direction: column; }

    /* CHAT AREA */
    .chat-area { background: var(--card); border-radius: var(--radius); padding: 1.5rem; box-shadow: 0 4px 20px rgba(0,0,0,0.07); margin-bottom: 1.25rem; min-height: 180px; display: flex; flex-direction: column; gap: 1rem; }

    /* BUBBLES */
    .bubble-wrap { display: flex; align-items: flex-end; gap: 0.6rem; animation: slideUp .3s ease; }
    .bubble-wrap.player { flex-direction: row-reverse; }
    @keyframes slideUp { from{opacity:0;transform:translateY(8px)} to{opacity:1;transform:translateY(0)} }

    .avatar { width: 38px; height: 38px; border-radius: 50%; display: flex; align-items: center; justify-content: center; font-size: 1.3rem; flex-shrink: 0; }
    .avatar-sam { background: #dbeafe; }
    .avatar-player { background: #d1fae5; }

    .bubble { max-width: 80%; padding: 0.7rem 1rem; border-radius: 16px; font-size: 0.95rem; font-weight: 700; line-height: 1.4; }
    .bubble-sam { background: #f1f5f9; color: var(--text); border-bottom-left-radius: 4px; }
    .bubble-player { background: var(--subject); color: white; border-bottom-right-radius: 4px; }
    .bubble-player.correct { background: var(--success); }
    .bubble-player.wrong { background: var(--error); }

    .bubble-meta { font-size: 0.75rem; font-weight: 700; color: var(--muted); margin-top: 0.2rem; text-align: right; }
    .bubble-meta.ok { color: var(--success); }
    .bubble-meta.ko { color: var(--error); }

    /* HINT */
    .hint-box { background: var(--subject-light); border-radius: 12px; padding: 0.7rem 1rem; font-size: 0.85rem; font-weight: 700; color: var(--subject); margin-bottom: 1rem; display: none; }

    /* OPTIONS */
    .options-card { background: var(--card); border-radius: var(--radius); padding: 1.25rem; box-shadow: 0 4px 20px rgba(0,0,0,0.07); }
    .options-label { font-size: 0.78rem; font-weight: 800; text-transform: uppercase; letter-spacing: .06em; color: var(--muted); margin-bottom: 0.75rem; }
    .options-list { display: grid; gap: 0.6rem; }
    .opt-btn { width: 100%; text-align: left; padding: 0.85rem 1.1rem; border-radius: 12px; border: 2px solid var(--border); background: white; font-family: inherit; font-size: 0.95rem; font-weight: 700; color: var(--text); cursor: pointer; transition: all .15s; }
    .opt-btn:hover:not(:disabled) { border-color: var(--subject); background: var(--subject-light); }
    .opt-btn.selected-correct { border-color: var(--success); background: var(--success-light); color: var(--success); }
    .opt-btn.selected-wrong { border-color: var(--error); background: var(--error-light); color: var(--error); animation: shake .3s; }
    .opt-btn.show-correct { border-color: var(--success); background: var(--success-light); color: var(--success); }
    .opt-btn:disabled { cursor: default; }
    @keyframes shake { 0%,100%{transform:translateX(0)} 25%{transform:translateX(-5px)} 75%{transform:translateX(5px)} }

    /* SCORE / WIN */
    .win-card { background: var(--card); border-radius: var(--radius); padding: 2.5rem 2rem; box-shadow: 0 4px 20px rgba(0,0,0,0.07); text-align: center; animation: slideUp .4s ease; }
    .win-emoji { font-size: 3.5rem; display: block; margin-bottom: 1rem; }
    .win-title { font-size: 1.5rem; font-weight: 900; margin-bottom: 0.5rem; }
    .win-sub { color: var(--muted); font-size: 0.9rem; margin-bottom: 1.5rem; }
    .stars { font-size: 2rem; letter-spacing: 0.1em; margin-bottom: 1.25rem; display: block; }
    .score-pill { display: inline-block; background: var(--subject-light); color: var(--subject); border-radius: 100px; padding: 0.5rem 1.5rem; font-size: 1.2rem; font-weight: 900; margin-bottom: 1.5rem; }
    .hidden { display: none !important; }
  </style>
</head>
<body>

<div class="top-bar">
  <div class="subject-badge">🇬🇧 Anglais</div>
  <h1>Se présenter en anglais</h1>
  <p>Choisissez la bonne réplique pour continuer la conversation</p>
</div>

<div class="container">

  <div class="progress-wrap">
    <div class="progress-bar"><div class="progress-fill" id="progressFill" style="width:0%"></div></div>
    <div class="progress-label" id="progressLabel">0 / 5</div>
  </div>

  <!-- Chat -->
  <div class="chat-area" id="chatArea"></div>

  <!-- Hint -->
  <div class="hint-box" id="hintBox"></div>

  <!-- Options -->
  <div class="options-card" id="optionsCard">
    <div class="options-label">Votre réponse :</div>
    <div class="options-list" id="optionsList"></div>
  </div>

  <!-- Win -->
  <div class="win-card hidden" id="winCard">
    <span class="win-emoji" id="winEmoji">🎉</span>
    <div class="win-title" id="winTitle">Conversation terminée !</div>
    <div class="win-sub" id="winSub"></div>
    <span class="stars" id="winStars"></span>
    <div class="score-pill" id="winScore"></div>
  </div>

</div>

<script>
  // ── DATA ─────────────────────────────────────────────
  const exchanges = [
    {
      sam: "Hi! I'm Sam. What's your name?",
      hint: "Pour donner son nom en anglais : My name is…",
      options: [
        { text: "Me call Lucas.", correct: false, feedback: "❌ On ne dit pas «me call». Il faut utiliser «My name is»." },
        { text: "My name is Lucas.", correct: true,  feedback: "✓ Parfait ! «My name is + prénom» est la formule correcte." },
        { text: "I am name Lucas.", correct: false, feedback: "❌ «I am name» n'est pas correct. On dit «My name is» ou «I am»." },
      ]
    },
    {
      sam: "Nice to meet you, Lucas! How old are you?",
      hint: "L'âge en anglais : I am … years old (pas «I have»).",
      options: [
        { text: "I have 12 years.", correct: false, feedback: "❌ «I have years» est un calque du français. En anglais on dit «I am … years old»." },
        { text: "I am 12 year.", correct: false, feedback: "❌ N'oubliez pas le «s» : «years old», pas «year old»." },
        { text: "I am 12 years old.", correct: true,  feedback: "✓ Correct ! «I am 12 years old» est la structure exacte." },
      ]
    },
    {
      sam: "Cool! Where are you from?",
      hint: "Pour dire d'où on vient : I am from … / I come from …",
      options: [
        { text: "I am from France.", correct: true,  feedback: "✓ Excellent ! «I am from + pays» est une structure très courante." },
        { text: "I come of France.", correct: false, feedback: "❌ On dit «I come FROM», pas «come of»." },
        { text: "I from France.", correct: false, feedback: "❌ Il manque le verbe : «I AM from France»." },
      ]
    },
    {
      sam: "France, nice! What do you like doing in your free time?",
      hint: "Après «like», on utilise le gérondif : like + verb-ing.",
      options: [
        { text: "I like play music.", correct: false, feedback: "❌ Après «like», on ajoute «-ing» : «I like playing music»." },
        { text: "I likes playing music.", correct: false, feedback: "❌ Avec «I», on ne met jamais de «s» au verbe : «I like»." },
        { text: "I like playing music.", correct: true,  feedback: "✓ Bravo ! «like + verb-ing» est la règle : «I like playing»." },
      ]
    },
    {
      sam: "That's great! Do you have any brothers or sisters?",
      hint: "Frère/sœur en anglais : brother / sister. Attention au pluriel.",
      options: [
        { text: "I have one brothers.", correct: false, feedback: "❌ «One» est singulier : «one brother», pas «brothers»." },
        { text: "I am have one brother.", correct: false, feedback: "❌ On ne peut pas mettre «am» et «have» ensemble. Dites juste «I have»." },
        { text: "I have one brother.", correct: true,  feedback: "✓ Parfait ! «I have one brother» est entièrement correct." },
      ]
    },
  ];

  // ── STATE ────────────────────────────────────────────
  let step = 0;
  let score = 0;
  let wrongThisStep = false;

  // ── INIT ─────────────────────────────────────────────
  function render() {
    if (step >= exchanges.length) { showWin(); return; }
    const ex = exchanges[step];
    addSamBubble(ex.sam);
    const hint = document.getElementById('hintBox');
    hint.textContent = '💡 ' + ex.hint;
    hint.style.display = 'none';
    wrongThisStep = false;
    updateProgress();
    renderOptions(ex);
  }

  function updateProgress() {
    const pct = (step / exchanges.length) * 100;
    document.getElementById('progressFill').style.width = pct + '%';
    document.getElementById('progressLabel').textContent = step + ' / ' + exchanges.length;
  }

  function renderOptions(ex) {
    const list = document.getElementById('optionsList');
    list.innerHTML = '';
    // shuffle options
    const opts = [...ex.options].sort(() => Math.random() - .5);
    opts.forEach(opt => {
      const btn = document.createElement('button');
      btn.className = 'opt-btn';
      btn.textContent = opt.text;
      btn.onclick = () => choose(btn, opt, ex);
      list.appendChild(btn);
    });
  }

  function choose(btn, opt, ex) {
    document.querySelectorAll('.opt-btn').forEach(b => b.disabled = true);
    if (opt.correct) {
      btn.classList.add('selected-correct');
      if (!wrongThisStep) score++;
      addPlayerBubble(opt.text, true, opt.feedback);
      setTimeout(() => {
        step++;
        render();
      }, 1400);
    } else {
      btn.classList.add('selected-wrong');
      wrongThisStep = true;
      document.getElementById('hintBox').style.display = 'block';
      addPlayerBubble(opt.text, false, opt.feedback);
      setTimeout(() => {
        btn.classList.remove('selected-wrong');
        document.querySelectorAll('.opt-btn').forEach(b => b.disabled = false);
        btn.disabled = true;
      }, 1000);
    }
  }

  function addSamBubble(text) {
    const chat = document.getElementById('chatArea');
    const wrap = document.createElement('div');
    wrap.className = 'bubble-wrap';
    wrap.innerHTML = `<div class="avatar avatar-sam">👦</div><div><div class="bubble bubble-sam">${text}</div></div>`;
    chat.appendChild(wrap);
    chat.scrollTop = chat.scrollHeight;
  }

  function addPlayerBubble(text, correct, feedback) {
    const chat = document.getElementById('chatArea');
    const wrap = document.createElement('div');
    wrap.className = 'bubble-wrap player';
    const meta = `<div class="bubble-meta ${correct?'ok':'ko'}">${feedback}</div>`;
    wrap.innerHTML = `<div class="avatar avatar-player">🧑</div><div><div class="bubble bubble-player ${correct?'correct':'wrong'}">${text}</div>${meta}</div>`;
    chat.appendChild(wrap);
    chat.scrollTop = chat.scrollHeight;
  }

  function showWin() {
    document.getElementById('optionsCard').classList.add('hidden');
    document.getElementById('hintBox').style.display = 'none';
    updateProgress();
    document.getElementById('progressFill').style.width = '100%';
    document.getElementById('progressLabel').textContent = exchanges.length + ' / ' + exchanges.length;

    const total = exchanges.length;
    const pct = score / total;
    let emoji, title, sub, stars;
    if (pct === 1)      { emoji='🏆'; title='Parfait !';       sub='Vous avez choisi la bonne réplique du premier coup à chaque fois.'; stars='⭐⭐⭐'; }
    else if (pct >= .6) { emoji='😊'; title='Bien joué !';     sub='Quelques hésitations, mais vous maîtrisez l\'essentiel.'; stars='⭐⭐'; }
    else                { emoji='💪'; title='À retravailler';   sub='Relisez les corrections et recommencez pour progresser.'; stars='⭐'; }

    document.getElementById('winEmoji').textContent = emoji;
    document.getElementById('winTitle').textContent = title;
    document.getElementById('winSub').textContent = sub;
    document.getElementById('winStars').textContent = stars;
    document.getElementById('winScore').textContent = score + ' / ' + total + ' réponses du premier coup';
    document.getElementById('winCard').classList.remove('hidden');
  }

  // Start
  render();
</script>
</body>
</html>
