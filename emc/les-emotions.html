<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>EMC – Les émotions</title>
  <meta name="niveau" content="CP">
  <meta name="matiere" content="EMC">
  <meta name="type" content="quiz">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Nunito:wght@400;600;700;800;900&display=swap" rel="stylesheet">
  <style>
    :root {
      --subject: #be185d;
      --subject-dark: #9d174d;
      --subject-light: #fce7f3;
      --subject-mid: #f9a8d4;
      --success: #059669;
      --success-light: #d1fae5;
      --error: #dc2626;
      --error-light: #fee2e2;
      --bg: #fff0f6;
      --card: #ffffff;
      --text: #1e293b;
      --muted: #64748b;
      --border: #e2e8f0;
      --radius: 18px;
    }
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    body { font-family: 'Nunito', system-ui, sans-serif; background: var(--bg); color: var(--text); min-height: 100vh; display: flex; flex-direction: column; align-items: center; }

    .top-bar { width: 100%; background: linear-gradient(135deg, #831843 0%, #be185d 60%, #ec4899 100%); color: white; padding: 1.25rem 1rem 3.5rem; text-align: center; position: relative; overflow: hidden; }
    .top-bar::after { content: ''; position: absolute; bottom: -20px; left: -5%; width: 110%; height: 40px; background: var(--bg); border-radius: 50% 50% 0 0; }
    .back-link { position: absolute; top: 1rem; left: 1rem; color: rgba(255,255,255,0.8); text-decoration: none; font-size: 0.85rem; font-weight: 700; }
    .back-link:hover { color: white; }
    .subject-badge { display: inline-flex; align-items: center; gap: 0.4rem; background: rgba(255,255,255,0.2); border-radius: 100px; padding: 0.25rem 0.8rem; font-size: 0.78rem; font-weight: 800; text-transform: uppercase; letter-spacing: 0.05em; margin-bottom: 0.75rem; }
    .top-bar h1 { font-size: clamp(1.3rem, 4vw, 1.9rem); font-weight: 900; margin-bottom: 0.3rem; }
    .top-bar p { font-size: 0.9rem; opacity: 0.85; }

    .container { width: 100%; max-width: 680px; padding: 2rem 1rem 3rem; flex: 1; display: flex; flex-direction: column; }

    .progress-wrap { margin-bottom: 1.5rem; background: var(--card); border-radius: 100px; padding: 0.75rem 1.25rem; box-shadow: 0 2px 12px rgba(190,24,93,0.08); display: flex; align-items: center; gap: 1rem; }
    .progress-track { flex: 1; height: 8px; background: var(--subject-light); border-radius: 100px; overflow: hidden; }
    .progress-fill { height: 100%; background: var(--subject); border-radius: 100px; transition: width 0.4s ease; }
    .progress-text { font-size: 0.82rem; font-weight: 700; color: var(--muted); white-space: nowrap; }

    .card { background: var(--card); border-radius: var(--radius); padding: 2rem; box-shadow: 0 4px 20px rgba(0,0,0,0.07); animation: slideUp 0.3s ease; }
    @keyframes slideUp { from { opacity: 0; transform: translateY(12px); } to { opacity: 1; transform: translateY(0); } }

    .intro-emoji { font-size: 4rem; text-align: center; margin-bottom: 1rem; }
    .intro-title { font-size: 1.4rem; font-weight: 900; text-align: center; margin-bottom: 0.75rem; }
    .intro-desc { color: var(--muted); text-align: center; line-height: 1.6; margin-bottom: 1.5rem; font-size: 1rem; }
    .emotions-preview {
      display: flex; flex-wrap: wrap; justify-content: center; gap: 0.75rem;
      margin-bottom: 1.5rem;
    }
    .emotion-chip {
      background: var(--subject-light);
      border-radius: 100px; padding: 0.4rem 0.9rem;
      font-size: 0.9rem; font-weight: 700;
      display: flex; align-items: center; gap: 0.4rem;
    }
    .btn-start { width: 100%; padding: 1rem; background: var(--subject); color: white; border: none; border-radius: 12px; font-family: inherit; font-size: 1.1rem; font-weight: 800; cursor: pointer; transition: background .15s; }
    .btn-start:hover { background: var(--subject-dark); }

    .q-type-badge { display: inline-block; background: var(--subject-light); color: var(--subject); font-size: 0.72rem; font-weight: 800; text-transform: uppercase; letter-spacing: 0.06em; border-radius: 100px; padding: 0.2rem 0.7rem; margin-bottom: 0.75rem; }
    .q-text { font-size: 1.1rem; font-weight: 700; line-height: 1.5; margin-bottom: 1rem; }
    .q-context { font-size: 0.88rem; color: var(--muted); margin-bottom: 1.25rem; line-height: 1.5; }

    /* Big emoji display */
    .emoji-display {
      font-size: 5rem; text-align: center;
      margin: 0.5rem auto 1.25rem;
      line-height: 1;
      background: var(--subject-light);
      border-radius: 16px;
      padding: 1.25rem;
      display: block;
    }

    /* Scenario card */
    .scenario-card {
      background: linear-gradient(135deg, var(--subject-light), #fff0f6);
      border-radius: 16px; padding: 1.25rem;
      margin-bottom: 1.25rem;
      border-left: 4px solid var(--subject);
    }
    .scenario-character { font-size: 2rem; margin-bottom: 0.5rem; }
    .scenario-text { font-size: 1rem; font-weight: 700; line-height: 1.5; color: var(--text); }

    /* Options – big and touch friendly for kids */
    .options { display: grid; grid-template-columns: 1fr 1fr; gap: 0.75rem; }
    .option-btn {
      border: 2.5px solid var(--border); background: white;
      border-radius: 16px; padding: 1rem 0.75rem;
      font-family: inherit; font-size: 0.95rem; font-weight: 800;
      cursor: pointer; text-align: center;
      transition: border-color .15s, background .15s, transform .1s;
      display: flex; flex-direction: column; align-items: center; gap: 0.4rem;
    }
    .option-btn .opt-emoji { font-size: 1.8rem; }
    .option-btn:hover:not(:disabled) { border-color: var(--subject); background: var(--subject-light); transform: scale(1.02); }
    .option-btn:active:not(:disabled) { transform: scale(0.98); }
    .option-btn.correct { border-color: var(--success); background: var(--success-light); }
    .option-btn.wrong { border-color: var(--error); background: var(--error-light); }
    .option-btn:disabled { cursor: default; transform: none; }

    .feedback { margin-top: 1rem; padding: 1rem 1.25rem; border-radius: 12px; display: none; }
    .feedback.show { display: block; animation: fadeIn .25s ease; }
    @keyframes fadeIn { from { opacity:0; transform: translateY(4px); } to { opacity:1; transform:none; } }
    .feedback.correct-fb { background: var(--success-light); border-left: 4px solid var(--success); }
    .feedback.wrong-fb { background: var(--error-light); border-left: 4px solid var(--error); }
    .feedback-title { font-weight: 800; font-size: 0.95rem; margin-bottom: 0.3rem; }
    .feedback.correct-fb .feedback-title { color: var(--success); }
    .feedback.wrong-fb .feedback-title { color: var(--error); }
    .feedback p { font-size: 0.88rem; line-height: 1.6; }

    .btn-next { margin-top: 1.25rem; width: 100%; padding: 0.9rem; background: var(--subject); color: white; border: none; border-radius: 12px; font-family: inherit; font-size: 1rem; font-weight: 800; cursor: pointer; display: none; }
    .btn-next.show { display: block; animation: fadeIn .3s ease; }
    .btn-next:hover { background: var(--subject-dark); }

    .results { text-align: center; }
    .results-emoji { font-size: 4rem; margin-bottom: 0.5rem; }
    .score-circle { display: inline-flex; flex-direction: column; align-items: center; justify-content: center; width: 130px; height: 130px; border-radius: 50%; background: conic-gradient(var(--subject) 0%, var(--subject) var(--pct), var(--subject-light) var(--pct)); margin: 1rem auto; position: relative; }
    .score-circle::before { content: ''; position: absolute; width: 95px; height: 95px; background: white; border-radius: 50%; }
    .score-inner { position: relative; z-index: 1; text-align: center; }
    .score-num { font-size: 1.8rem; font-weight: 900; color: var(--subject); display: block; }
    .score-total { font-size: 0.8rem; color: var(--muted); font-weight: 700; }
    .results-msg { font-size: 1.2rem; font-weight: 800; margin: 0.75rem 0 0.5rem; }
    .results-sub { color: var(--muted); font-size: 0.9rem; margin-bottom: 1.5rem; }
    .stars { font-size: 2rem; letter-spacing: 0.25rem; margin-bottom: 0.5rem; }
    .results-actions { display: flex; gap: 0.75rem; flex-direction: column; }
    .btn-retry { padding: 0.9rem; background: var(--subject); color: white; border: none; border-radius: 12px; font-family: inherit; font-size: 1rem; font-weight: 800; cursor: pointer; }
    .btn-home { padding: 0.9rem; background: var(--subject-light); color: var(--subject); border: none; border-radius: 12px; font-family: inherit; font-size: 1rem; font-weight: 800; cursor: pointer; text-decoration: none; display: block; }

    .screen { display: none; }
    .screen.active { display: block; }

    @media (max-width: 400px) {
      .options { grid-template-columns: 1fr 1fr; }
      .option-btn { font-size: 0.82rem; padding: 0.75rem 0.5rem; }
    }
  </style>
</head>
<body>

<div class="top-bar">
  <div class="subject-badge">💛 EMC</div>
  <h1>Les émotions</h1>
  <p>Reconnaître et nommer ses émotions</p>
</div>

<div class="container">
  <div class="progress-wrap" id="progressWrap" style="display:none">
    <div class="progress-track">
      <div class="progress-fill" id="progressFill" style="width:0%"></div>
    </div>
    <span class="progress-text" id="progressText">0 / 8</span>
  </div>

  <div class="card screen active" id="screenIntro">
    <div class="intro-emoji">💛</div>
    <div class="intro-title">Les émotions</div>
    <div class="intro-desc">Nous ressentons tous des émotions ! Apprends à les reconnaître et à les nommer.</div>
    <div class="emotions-preview">
      <div class="emotion-chip">😊 La joie</div>
      <div class="emotion-chip">😢 La tristesse</div>
      <div class="emotion-chip">😠 La colère</div>
      <div class="emotion-chip">😨 La peur</div>
      <div class="emotion-chip">😲 La surprise</div>
      <div class="emotion-chip">🤢 Le dégoût</div>
    </div>
    <!-- Ideogram prompt: "Six cute cartoon children showing different emotions: joy, sadness, anger, fear, surprise, disgust. Colorful, friendly illustration, educational, white background, primary school style" -->
    <button class="btn-start" onclick="game.start()">Commencer le jeu ▶</button>
  </div>

  <div class="card screen" id="screenQuestion">
    <div id="questionContent"></div>
    <div class="feedback" id="feedback">
      <div class="feedback-title" id="feedbackTitle"></div>
      <p id="feedbackText"></p>
    </div>
    <button class="btn-next" id="btnNext" onclick="game.next()">Question suivante →</button>
  </div>

  <div class="card screen" id="screenResults">
    <div class="results">
      <div class="results-emoji" id="resultsEmoji">🎉</div>
      <div class="stars" id="resultsStars">⭐⭐⭐</div>
      <div class="score-circle" id="scoreCircle">
        <div class="score-inner">
          <span class="score-num" id="scoreNum">8</span>
          <span class="score-total">/ 8</span>
        </div>
      </div>
      <div class="results-msg" id="resultsMsg">Excellent !</div>
      <div class="results-sub" id="resultsSub"></div>
      <div class="results-actions">
        <button class="btn-retry" onclick="game.restart()">🔄 Rejouer</button>
      </div>
    </div>
  </div>
</div>

<script>
const QUESTIONS = [
  {
    type: 'emoji_qcm',
    badge: 'Quelle émotion ?',
    text: 'Regarde cet emoji. Quelle émotion montre-t-il ?',
    emoji: '😊',
    options: [
      { emoji: '😊', label: 'La joie' },
      { emoji: '😢', label: 'La tristesse' },
      { emoji: '😠', label: 'La colère' },
      { emoji: '😨', label: 'La peur' }
    ],
    correct: 0,
    explanation: '😊 <strong>La joie</strong>, c\'est quand on se sent heureux, content. On sourit, on a envie de rire et de partager de bons moments avec les autres !'
  },
  {
    type: 'scenario',
    badge: 'Mise en situation',
    character: '👦',
    scenario: 'Lucas vient d\'apprendre que son chien est malade. Il a les larmes aux yeux et ne veut plus jouer.',
    text: 'Quelle émotion ressent Lucas ?',
    options: [
      { emoji: '😊', label: 'La joie' },
      { emoji: '😢', label: 'La tristesse' },
      { emoji: '😲', label: 'La surprise' },
      { emoji: '😠', label: 'La colère' }
    ],
    correct: 1,
    explanation: 'Lucas ressent 😢 <strong>la tristesse</strong>. C\'est normal d\'être triste quand quelque chose de difficile arrive. Exprimer sa tristesse aide à se sentir mieux.'
  },
  {
    type: 'emoji_qcm',
    badge: 'Quelle émotion ?',
    text: 'Regarde cet emoji. Quel mot correspond ?',
    emoji: '😠',
    options: [
      { emoji: '😨', label: 'La peur' },
      { emoji: '😊', label: 'La fierté' },
      { emoji: '😠', label: 'La colère' },
      { emoji: '🤢', label: 'Le dégoût' }
    ],
    correct: 2,
    explanation: '😠 <strong>La colère</strong>, c\'est quand quelque chose nous énerve ou nous semble injuste. On peut sentir son cœur qui bat très vite. Il existe des façons positives d\'exprimer sa colère sans blesser les autres.'
  },
  {
    type: 'scenario',
    badge: 'Mise en situation',
    character: '👧',
    scenario: 'Ce soir, Emma voit une araignée sur son oreiller. Son cœur s\'accélère, elle recule et crie !',
    text: 'Quelle émotion ressent Emma ?',
    options: [
      { emoji: '😢', label: 'La tristesse' },
      { emoji: '😊', label: 'La joie' },
      { emoji: '😨', label: 'La peur' },
      { emoji: '😠', label: 'La colère' }
    ],
    correct: 2,
    explanation: 'Emma ressent 😨 <strong>la peur</strong>. C\'est une émotion qui nous protège en nous alertant d\'un danger. Quand on a peur, on peut en parler à un adulte de confiance.'
  },
  {
    type: 'emoji_qcm',
    badge: 'La bonne réaction',
    text: 'Tom a fait tomber le dessin de sa sœur par accident. Elle pleure. Que devrait faire Tom ?',
    emoji: '🤔',
    options: [
      { emoji: '🏃', label: 'S\'enfuir sans rien dire' },
      { emoji: '🤗', label: 'S\'excuser et proposer son aide' },
      { emoji: '😂', label: 'Se moquer d\'elle' },
      { emoji: '😴', label: 'Faire semblant de dormir' }
    ],
    correct: 1,
    explanation: 'La bonne attitude est de 🤗 <strong>s\'excuser sincèrement et proposer son aide</strong>. Reconnaître ses erreurs et montrer de l\'empathie (comprendre ce que ressent l\'autre) aide à bien vivre ensemble.'
  },
  {
    type: 'scenario',
    badge: 'Mise en situation',
    character: '👦',
    scenario: 'Pour son anniversaire, Théo reçoit exactement le jouet qu\'il voulait ! Il n\'y croyait plus !',
    text: 'Quelle émotion ressent Théo en premier ?',
    options: [
      { emoji: '😲', label: 'La surprise' },
      { emoji: '😢', label: 'La tristesse' },
      { emoji: '😠', label: 'La colère' },
      { emoji: '😴', label: 'L\'ennui' }
    ],
    correct: 0,
    explanation: 'Théo ressent d\'abord 😲 <strong>la surprise</strong> (il ne s\'y attendait plus), puis sûrement 😊 la joie ! La surprise peut être agréable ou désagréable selon la situation.'
  },
  {
    type: 'emoji_qcm',
    badge: 'Nommer l\'émotion',
    text: 'Regarde cet emoji. Comment s\'appelle cette émotion ?',
    emoji: '😲',
    options: [
      { emoji: '😲', label: 'La surprise' },
      { emoji: '😊', label: 'La joie' },
      { emoji: '😢', label: 'La tristesse' },
      { emoji: '😨', label: 'La peur' }
    ],
    correct: 0,
    explanation: '😲 <strong>La surprise</strong>, c\'est quand quelque chose d\'inattendu arrive. Elle peut être bonne ou mauvaise ! Notre cerveau a besoin d\'un moment pour comprendre ce qui se passe.'
  },
  {
    type: 'scenario',
    badge: 'Bonne pratique',
    character: '👧',
    scenario: 'Léa est très en colère car une camarade a pris son crayon sans demander. Elle a envie de crier.',
    text: 'Que peut faire Léa pour gérer sa colère ?',
    options: [
      { emoji: '🤬', label: 'Crier très fort et frapper' },
      { emoji: '💨', label: 'Respirer profondément et expliquer ses sentiments' },
      { emoji: '🤐', label: 'Garder sa colère pour elle sans rien dire' },
      { emoji: '😭', label: 'Pleurer sans pouvoir s\'arrêter' }
    ],
    correct: 1,
    explanation: 'La meilleure solution est 💨 <strong>de respirer profondément et d\'expliquer ses sentiments</strong> calmement. On peut dire : "Je suis en colère parce que tu as pris mon crayon sans demander." Cela aide à résoudre le problème sans blesser personne.'
  }
];

const game = (() => {
  let questions, currentIdx, score, answered;

  function shuffle(arr) {
    const a = [...arr]; for (let i = a.length - 1; i > 0; i--) { const j = Math.floor(Math.random() * (i + 1)); [a[i], a[j]] = [a[j], a[i]]; } return a;
  }
  function show(id) { document.querySelectorAll('.screen').forEach(s => s.classList.remove('active')); document.getElementById(id).classList.add('active'); }

  function start() { questions = shuffle(QUESTIONS); currentIdx = 0; score = 0; answered = false; document.getElementById('progressWrap').style.display = 'flex'; showQuestion(); }

  function updateProgress() {
    const pct = (currentIdx / questions.length) * 100;
    document.getElementById('progressFill').style.width = pct + '%';
    document.getElementById('progressText').textContent = currentIdx + ' / ' + questions.length;
  }

  function renderOptions(opts) {
    return `<div class="options">
      ${opts.map((opt, i) => `
        <button class="option-btn" onclick="game.answerQCM(${i})">
          <span class="opt-emoji">${opt.emoji}</span>
          <span>${opt.label}</span>
        </button>`).join('')}
    </div>`;
  }

  function showQuestion() {
    answered = false; updateProgress();
    const q = questions[currentIdx];
    const el = document.getElementById('questionContent');
    document.getElementById('feedback').className = 'feedback';
    document.getElementById('btnNext').className = 'btn-next';

    if (q.type === 'emoji_qcm') {
      el.innerHTML = `
        <div class="q-type-badge">${q.badge}</div>
        <div class="q-text">${q.text}</div>
        <span class="emoji-display">${q.emoji}</span>
        ${renderOptions(q.options)}`;
    } else if (q.type === 'scenario') {
      el.innerHTML = `
        <div class="q-type-badge">${q.badge}</div>
        <div class="scenario-card">
          <div class="scenario-character">${q.character}</div>
          <div class="scenario-text">${q.scenario}</div>
        </div>
        <div class="q-text">${q.text}</div>
        ${renderOptions(q.options)}`;
    }
    show('screenQuestion');
  }

  function showFeedback(isCorrect, explanation) {
    answered = true;
    const fb = document.getElementById('feedback');
    const title = document.getElementById('feedbackTitle');
    if (isCorrect) {
      score++;
      const msgs = ['✅ Bravo !', '✅ Super !', '✅ C\'est ça !', '✅ Bien joué !', '✅ Parfait !'];
      title.textContent = msgs[Math.floor(Math.random() * msgs.length)];
      fb.className = 'feedback show correct-fb';
    } else {
      title.textContent = '❌ Pas tout à fait…';
      fb.className = 'feedback show wrong-fb';
    }
    document.getElementById('feedbackText').innerHTML = explanation;
    document.getElementById('btnNext').className = 'btn-next show';
  }

  function answerQCM(idx) {
    if (answered) return;
    const q = questions[currentIdx];
    const btns = document.querySelectorAll('.option-btn');
    btns.forEach(b => b.disabled = true);
    btns[q.correct].classList.add('correct');
    if (idx !== q.correct) btns[idx].classList.add('wrong');
    showFeedback(idx === q.correct, q.explanation);
  }

  function next() { currentIdx++; if (currentIdx >= questions.length) showResults(); else showQuestion(); }

  function showResults() {
    updateProgress();
    document.getElementById('progressFill').style.width = '100%';
    document.getElementById('progressText').textContent = questions.length + ' / ' + questions.length;
    const pct = score / questions.length;
    let emoji, msg, sub, stars;
    if (pct === 1) { emoji='🥇'; stars='⭐⭐⭐'; msg='Parfait !'; sub='Tu connais très bien les émotions !'; }
    else if (pct >= .75) { emoji='🎉'; stars='⭐⭐⭐'; msg='Très bien !'; sub='Tu es fort(e) pour reconnaître les émotions !'; }
    else if (pct >= .5) { emoji='👍'; stars='⭐⭐'; msg='Bien !'; sub='Continue, tu apprends vite !'; }
    else { emoji='💛'; stars='⭐'; msg='Continue !'; sub='Les émotions, ça s\'apprend. Réessaie !'; }
    document.getElementById('resultsEmoji').textContent = emoji;
    document.getElementById('resultsStars').textContent = stars;
    document.getElementById('scoreNum').textContent = score;
    document.getElementById('scoreCircle').style.setProperty('--pct', Math.round(pct * 360) + 'deg');
    document.getElementById('resultsMsg').textContent = msg;
    document.getElementById('resultsSub').textContent = sub;
    show('screenResults');
  }

  function restart() { show('screenIntro'); document.getElementById('progressWrap').style.display = 'none'; document.getElementById('progressFill').style.width = '0%'; }

  return { start, answerQCM, next, restart };
})();
</script>
</body>
</html>
